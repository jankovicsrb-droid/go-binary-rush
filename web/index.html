<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Go Binary Rush</title>
  <meta name="description" content="Fast-paced binary number puzzle game. Eight modes built around binary and hex manipulation. Hacker terminal aesthetic.">

  <!-- iOS / PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Go Binary Rush">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->

  <meta property="og:image" content="https://gojankovic.github.io/go-binary-rush/icons/Icon-512.png">
  <meta property="og:url" content="https://gojankovic.github.io/go-binary-rush/">

  <meta name="twitter:card" content="summary_large_image">

  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #flutter-host {
      width: 100%;
      height: 100%;
      max-width: 420px;
      max-height: 900px;
      background: #000;
      box-shadow: 0 0 80px rgba(125, 255, 151, 0.08);
      position: relative;
      border: 1px solid #163B1F;

        max-height: 100%;
        box-shadow: none;
        border: none;
      }
